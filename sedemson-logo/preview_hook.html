<!DOCTYPE html>
<html>
<head>
    <style>
        body { background: #333; display: flex; flex-direction: column; align-items: center; padding: 50px; color: white; }
        .container { display: flex; gap: 40px; margin-top: 20px; }
        svg { background: white; border-radius: 8px; }
        .label { margin-bottom: 10px; font-weight: bold; }
    </style>
</head>
<body>
    <div class="label">Reference Image</div>
    <img src="file:///c:/Users/DELL/KCA/Kone-Code-Academy/image.png" style="height: 100px; background: white; padding: 10px; border-radius: 8px;">

    <div class="container">
        <div>
            <div class="label">True S-Path (Hook Style)</div>
            <svg width="200" height="200" viewBox="0 0 100 120">
              <linearGradient id="gold" x1="0%" y1="0%" x2="100%" y2="100%">
                <stop offset="0%" stop-color="#D4AF37" />
                <stop offset="50%" stop-color="#F1C40F" />
                <stop offset="100%" stop-color="#9A7B0C" />
              </linearGradient>
              <!-- Top Hook: Sweeps from right to left and back to center -->
              <path d="M 85 25 C 85 5, 45 5, 25 25 C 10 40, 35 65, 55 65 L 50 55 C 35 55, 20 40, 30 30 C 45 15, 75 15, 75 25 Z" fill="url(#gold)" />
              
              <!-- Bottom Hook: Sweeps from left to right and back to center -->
              <path d="M 15 95 C 15 115, 55 115, 75 95 C 90 80, 65 55, 45 55 L 50 65 C 65 65, 80 80, 70 90 C 55 105, 25 105, 25 95 Z" fill="url(#gold)" />
            </svg>
        </div>
    </div>
</body>
</html>
